<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kestos — Break Free</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --wine: #843040;
            --salt: #FFFEFA;
            --charcoal: #1a1a1a;
            --stone: #f5f5f3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--salt);
            color: var(--charcoal);
            line-height: 1.6;
            font-weight: 300;
        }

        /* Typography */
        .serif {
            font-family: 'Cormorant Garamond', serif;
        }

        /* Loading */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--salt);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: var(--charcoal);
            animation: fade 2s infinite;
        }

        @keyframes fade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Section Base */
        section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 24px;
        }

        /* Hero */
        .hero {
            background: var(--stone);
            overflow: hidden;
        }

        .hero-image {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 100%;
            background: url('images/hero-model.jpg') center/cover no-repeat;
            animation: slowZoom 25s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 100%;
            background: linear-gradient(to right, var(--stone) 0%, transparent 30%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 400px;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 80px;
            color: var(--charcoal);
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(48px, 12vw, 80px);
            font-weight: 300;
            line-height: 1;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        .hero-title em {
            font-style: italic;
            color: var(--wine);
        }

        .hero-sub {
            font-size: 13px;
            line-height: 2;
            color: rgba(26, 26, 26, 0.6);
            margin-bottom: 60px;
            max-width: 280px;
        }

        .scroll-line {
            width: 1px;
            height: 60px;
            background: var(--charcoal);
            opacity: 0.3;
            animation: lineMove 2s ease-in-out infinite;
        }

        @keyframes lineMove {
            0%, 100% { transform: scaleY(1); transform-origin: top; }
            50% { transform: scaleY(0.5); transform-origin: top; }
        }

        /* Manifesto */
        .manifesto {
            background: var(--salt);
            align-items: center;
            text-align: center;
        }

        .manifesto-year {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            letter-spacing: 4px;
            color: rgba(26, 26, 26, 0.4);
            margin-bottom: 40px;
        }

        .manifesto-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 300;
            line-height: 1.4;
            max-width: 600px;
            margin-bottom: 60px;
        }

        .manifesto-text em {
            font-style: italic;
            color: var(--wine);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--charcoal);
            opacity: 0.2;
            margin: 0 auto 60px;
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .keyword {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.5);
        }

        /* Collection */
        .collection {
            background: var(--charcoal);
            color: var(--salt);
            padding: 0;
            flex-direction: row;
            min-height: 80vh;
        }

        .collection-image {
            width: 50%;
            background: url('images/hero-swim.jpg') center/cover no-repeat;
        }

        .collection-content {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .collection-label {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 30px;
        }

        .collection-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .collection-desc {
            font-size: 13px;
            line-height: 2;
            opacity: 0.7;
            max-width: 320px;
        }

        /* Product */
        .product {
            background: var(--stone);
            align-items: center;
            text-align: center;
        }

        .product-image {
            width: 100%;
            max-width: 400px;
            height: 500px;
            background: url('images/hero-surf.jpg') center/cover no-repeat;
            margin-bottom: 60px;
            position: relative;
        }

        .product-image::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: var(--charcoal);
            opacity: 0.2;
        }

        .product-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 16px;
        }

        .product-price {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(26, 26, 26, 0.5);
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 18px 48px;
            border: 1px solid var(--charcoal);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--charcoal);
            transition: all 0.4s ease;
            background: transparent;
        }

        .btn:hover {
            background: var(--charcoal);
            color: var(--salt);
        }

        /* Footer */
        footer {
            background: var(--charcoal);
            color: var(--salt);
            padding: 80px 24px;
            text-align: center;
        }

        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
        }

        .footer-links a {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 254, 250, 0.6);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--salt);
        }

        .footer-copy {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255, 254, 250, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-image {
                width: 100%;
                opacity: 0.4;
            }
            
            .hero-overlay {
                width: 100%;
                background: linear-gradient(to bottom, var(--stone) 0%, transparent 50%);
            }
            
            .hero-content {
                max-width: 100%;
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            
            .collection {
                flex-direction: column;
            }
            
            .collection-image,
            .collection-content {
                width: 100%;
                min-height: 50vh;
            }
            
            .collection-content {
                padding: 60px 24px;
            }
            
            .keywords {
                gap: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-text">Kestos</div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-image"></div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <div class="logo">Kestos</div>
            <h1 class="hero-title serif">
                Break<br>
                <em>Free</em>
            </h1>
            
            <p class="hero-sub">
                始于 1925 年的伦敦<br>
                重新定义女性的自由
            </p>
            
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- Manifesto -->
    <section class="manifesto">
        <div class="manifesto-year">Since 1925</div>
        
        <h2 class="manifesto-text serif">
            释放自我，始于 Kestos<br>
            超越游泳，<em>超越汗水</em>
        </h2>
        
        <div class="divider"></div>
        
        <div class="keywords">
            <span class="keyword">灵动</span>
            <span class="keyword">极简</span>
            <span class="keyword">多功能</span>
            <span class="keyword">海岸感</span>
            <span class="keyword">永恒</span>
        </div>
    </section>

    <!-- Collection -->
    <section class="collection">
        <div class="collection-image"></div>
        
        <div class="collection-content">
            <div class="collection-label">New Collection</div>
            
            <h2 class="collection-title serif">
                水陆两栖<br>
                无缝切换
            </h2>
            
            <p class="collection-desc">
                高性能面料支持从高强度陆地运动直接切换至水下场景，无需更换装束。
            </p>
        </div>
    </section>

    <!-- Product -->
    <section class="product">
        <div class="product-image"></div>
        
        <h3 class="product-name serif">The Classic Set</h3>
        <div class="product-price">$128 USD</div>
        
        <a href="#" class="btn">Shop Now</a>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-logo">Kestos</div>
        
        <div class="footer-links">
            <a href="#">Collection</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
        
        <div class="footer-copy">© 2026 Kestos. All rights reserved.</div>
    </footer>

    <script>
        // Loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 2000);
        });
    </script>
</body>
</html>
